apiVersion: v1
kind: Service
metadata:
  name: {{ include "tunnel-relay.fullname" . }}
  labels:
    {{- include "tunnel-relay.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 3000
      protocol: TCP
  selector:
    {{- include "tunnel-relay.selectorLabels" . | nindent 4 }}
