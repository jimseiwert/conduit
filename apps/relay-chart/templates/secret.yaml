apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tunnel-relay.fullname" . }}
  labels:
    {{- include "tunnel-relay.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.env.TUNNEL_JWT_SECRET }}
  TUNNEL_JWT_SECRET: {{ .Values.env.TUNNEL_JWT_SECRET | b64enc | quote }}
  {{- else }}
  {{- fail "env.TUNNEL_JWT_SECRET is required. Set it with --set env.TUNNEL_JWT_SECRET=..." }}
  {{- end }}
  {{- if .Values.env.RELAY_REGISTRATION_TOKEN }}
  RELAY_REGISTRATION_TOKEN: {{ .Values.env.RELAY_REGISTRATION_TOKEN | b64enc | quote }}
  {{- end }}
