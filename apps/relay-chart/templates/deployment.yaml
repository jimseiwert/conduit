apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tunnel-relay.fullname" . }}
  labels:
    {{- include "tunnel-relay.labels" . | nindent 4 }}
spec:
  # IMPORTANT: Do NOT increase replicas. In-memory WS registry is not distributed.
  # See values.yaml for explanation. Ignored even if replicaCount is changed.
  replicas: 1
  selector:
    matchLabels:
      {{- include "tunnel-relay.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tunnel-relay.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: relay
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "tunnel-relay.fullname" . }}-data
      {{- end }}
