name: E2E tests (dashboard)

on:
  push:
    branches:
      - main
    paths:
      - 'apps/dashboard/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    paths:
      - 'apps/dashboard/**'
      - '.github/workflows/e2e.yml'

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: conduit
          POSTGRES_PASSWORD: conduit
          POSTGRES_DB: conduit_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://conduit:conduit@localhost:5432/conduit_test
      CONDUIT_JWT_SECRET: ci-test-jwt-secret-32chars-minimum
      BETTER_AUTH_SECRET: ci-test-better-auth-secret-32chars
      # Fake OAuth credentials — tests don't complete OAuth flows, just render
      GITHUB_CLIENT_ID: ci-fake-github-client-id
      GITHUB_CLIENT_SECRET: ci-fake-github-client-secret
      GOOGLE_CLIENT_ID: ci-fake-google-client-id
      GOOGLE_CLIENT_SECRET: ci-fake-google-client-secret
      NEXTAUTH_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        working-directory: apps/dashboard
        run: bunx playwright install chromium --with-deps

      - name: Build Next.js app
        working-directory: apps/dashboard
        run: bun run build

      - name: Run Playwright tests
        working-directory: apps/dashboard
        run: bunx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/dashboard/playwright-report/
          retention-days: 7
