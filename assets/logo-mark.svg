<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Dark background rounded rect -->
  </defs>

  <rect width="100" height="100" rx="22" fill="#0F172A"/>
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="40" stroke="url(#ring)" stroke-width="4"/>
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="24" stroke="url(#ring)" stroke-width="4"/>
  <!-- Data pulse -->
  <g filter="url(#glow)">
    <path d="M32 50h36M56 39l12 11-12 11" stroke="url(#pulse)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
