<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon mark: pipe cross-section -->
  <circle cx="40" cy="40" r="34" stroke="url(#ring)" stroke-width="3"/>
  <circle cx="40" cy="40" r="20" stroke="url(#ring)" stroke-width="3"/>
  <!-- Data pulse arrow -->
  <g filter="url(#glow)">
    <path d="M26 40h28M46 31l9 9-9 9" stroke="url(#pulse)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="90" y="52" font-family="-apple-system, 'Geist', 'Inter', sans-serif" font-size="32" font-weight="600" letter-spacing="-0.5" fill="url(#ring)">conduit</text>
</svg>
