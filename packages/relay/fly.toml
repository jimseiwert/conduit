app = "conduit-tfrhqa"
primary_region = "iad"

[env]
  PORT = "3000"
  RELAY_DOMAIN = "relay.conduitrelay.com"
  RELAY_PROTO = "https"
  FORWARD_TIMEOUT_MS = "10000"
  RING_BUFFER_SIZE = "1000"
  MAX_BODY_BYTES = "1048576"

# Secrets (set once with `fly secrets set`):
#   CONDUIT_JWT_SECRET
#   STORAGE_ADAPTER=postgres
#   DATABASE_URL=<neon-connection-string>
#   RELAY_REGISTRATION_TOKEN  (optional)

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 500
    soft_limit = 400

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"


[[checks]]
  name = "healthz"
  port = 3000
  type = "http"
  interval = "15s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/healthz"
